name: Build LogAnalyzerPlugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      run: nuget restore packages.config -PackagesDirectory packages

    - name: Install DllExport
      run: |
        & ".\packages\DllExport.1.7.4\tools\net.r_eg.DllExport.Wizard.exe" -action Configure -sln-dir . -sln-file LogAnalyzerPlugin.csproj -metalib ".\packages\DllExport.1.7.4\gcache\metalib"

    - name: Build plugin
      run: msbuild LogAnalyzerPlugin.csproj /p:Configuration=Release /p:Platform=x64 /v:minimal

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: LogAnalyzerPlugin-DLL
        path: bin/Release/net48/LogAnalyzerPlugin.dll
        if-no-files-found: error

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/Release/net48/LogAnalyzerPlugin.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
